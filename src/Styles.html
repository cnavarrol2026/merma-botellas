<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f7f9;
    --panel: #ffffff;
    --text: #1f2933;
    --muted: #607080;
    --line: #d9e1e8;
    --primary: #0f766e;
    --primary-strong: #115e59;
    --danger: #b42318;
    --warning: #b76e00;
    --shadow: 0 10px 30px rgba(20, 30, 40, 0.08);
  }

  body.dark {
    --bg: #111827;
    --panel: #1f2937;
    --text: #f3f4f6;
    --muted: #b6c2cf;
    --line: #374151;
    --primary: #2dd4bf;
    --primary-strong: #5eead4;
    --danger: #f87171;
    --warning: #fbbf24;
    --shadow: none;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
  }

  .app-header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 18px;
    min-height: 72px;
    padding: 12px 22px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 210px;
  }

  .brand-logo {
    width: 48px;
    height: 48px;
    object-fit: contain;
    border-radius: 6px;
    background: #ffffff;
  }

  .brand span,
  .muted {
    display: block;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
  }

  button,
  select,
  input {
    min-height: 38px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--panel);
    color: var(--text);
    font: inherit;
  }

  button {
    padding: 0 14px;
    background: var(--primary);
    border-color: var(--primary);
    color: #ffffff;
    cursor: pointer;
    font-weight: 700;
  }

  button:hover {
    background: var(--primary-strong);
  }

  button.secondary,
  .tab {
    background: transparent;
    color: var(--text);
    border-color: var(--line);
  }

  .tab.is-active {
    background: var(--primary);
    color: #ffffff;
    border-color: var(--primary);
  }

  .danger {
    background: var(--danger);
    border-color: var(--danger);
  }

  .icon-button {
    width: 42px;
    padding: 0;
  }

  main {
    width: min(1220px, calc(100vw - 28px));
    margin: 24px auto;
  }

  .view {
    display: none;
  }

  .view.is-active {
    display: block;
  }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
  }

  .section-head.compact {
    margin-bottom: 10px;
  }

  .inline-kpi {
    min-width: 190px;
    padding: 10px 14px;
    border: 1px solid rgba(15, 118, 110, 0.28);
    border-radius: 8px;
    background: rgba(15, 118, 110, 0.09);
    text-align: right;
  }

  .inline-kpi span,
  .inline-kpi small {
    display: block;
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .inline-kpi strong {
    display: block;
    margin: 3px 0;
    color: var(--primary-strong);
    font-size: 1.65rem;
    line-height: 1;
  }

  .inline-kpi strong span {
    color: inherit;
    font-size: inherit;
    font-weight: inherit;
    text-transform: none;
  }

  h1,
  h2 {
    margin: 0;
    letter-spacing: 0;
  }

  h1 {
    font-size: 1.8rem;
  }

  h2 {
    font-size: 1.05rem;
  }

  .work-grid,
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }

  .panel,
  .kpi {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 16px;
  }

  .kpi-grid {
    grid-template-columns: repeat(5, minmax(0, 1fr));
  }

  .kpi span {
    color: var(--muted);
    font-size: 0.88rem;
  }

  .kpi strong {
    display: block;
    margin-top: 8px;
    font-size: 1.7rem;
  }

  label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  input,
  select {
    width: 100%;
    padding: 0 10px;
  }

  .combo-field {
    position: relative;
  }

  .combo-list {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 4px);
    z-index: 20;
    display: none;
    max-height: 260px;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }

  .combo-list.is-open {
    display: block;
  }

  .combo-option {
    width: 100%;
    min-height: 42px;
    padding: 8px 10px;
    background: transparent;
    border: 0;
    border-radius: 0;
    color: var(--text);
    text-align: left;
    font-weight: 400;
  }

  .combo-option:hover,
  .combo-option.is-active {
    background: rgba(15, 118, 110, 0.12);
    color: var(--text);
  }

  .combo-option strong {
    display: block;
  }

  .combo-option span {
    color: var(--muted);
    font-size: 0.85rem;
  }

  .form-row,
  .filters {
    display: flex;
    align-items: end;
    gap: 10px;
    flex-wrap: wrap;
  }

  .form-row label {
    flex: 1 1 160px;
  }

  .close-row label {
    max-width: 220px;
  }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--line);
    border-radius: 8px;
  }

  table {
    width: 100%;
    min-width: 680px;
    border-collapse: collapse;
  }

  th,
  td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }

  th {
    color: var(--muted);
    font-size: 0.82rem;
    text-transform: uppercase;
  }

  tr:last-child td {
    border-bottom: 0;
  }

  .row-actions {
    display: flex;
    gap: 6px;
  }

  .row-actions button {
    min-height: 32px;
    padding: 0 10px;
  }

  .summary-line {
    margin: 6px 0 14px;
    color: var(--muted);
  }

  dialog {
    width: min(720px, calc(100vw - 24px));
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    color: var(--text);
  }

  #recordDialog {
    width: min(980px, calc(100vw - 24px));
  }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin: 12px 0;
  }

  .edit-detail-row {
    display: grid;
    grid-template-columns: 1.4fr 0.8fr 0.8fr auto;
    gap: 8px;
    align-items: end;
    margin-bottom: 8px;
  }

  dialog menu {
    display: flex;
    justify-content: end;
    gap: 10px;
    padding: 0;
  }

  #toast {
    position: fixed;
    right: 18px;
    bottom: 18px;
    max-width: min(420px, calc(100vw - 36px));
    padding: 12px 14px;
    border-radius: 8px;
    background: var(--text);
    color: var(--panel);
    opacity: 0;
    transform: translateY(8px);
    transition: 160ms ease;
  }

  #toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 820px) {
    .app-header {
      grid-template-columns: 1fr auto;
    }

    .tabs {
      grid-column: 1 / -1;
      order: 3;
    }

    .work-grid,
    .kpi-grid {
      grid-template-columns: 1fr;
    }

    .section-head {
      align-items: stretch;
      flex-direction: column;
    }

    .inline-kpi {
      text-align: left;
      width: 100%;
    }

    .detail-grid,
    .edit-detail-row {
      grid-template-columns: 1fr;
    }
  }

  @media print {
    body {
      background: #ffffff;
      color: #000000;
    }

    .app-header,
    .filters,
    #toast,
    dialog,
    button {
      display: none !important;
    }

    main {
      width: 100%;
      margin: 0;
    }

    .view {
      display: none !important;
    }

    #reporte {
      display: block !important;
    }

    .panel {
      border: 0;
      box-shadow: none;
    }
  }
</style>
